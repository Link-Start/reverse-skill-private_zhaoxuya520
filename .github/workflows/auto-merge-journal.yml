name: Auto-merge field-journal PRs

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'skills/field-journal/**'

jobs:
  validate-and-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate PR safety
        id: validate
        run: |
          set -e
          
          # 1. 只允许修改 field-journal 目录下的 .md 文件
          CHANGED_FILES=$(gh pr diff ${{ github.event.pull_request.number }} --name-only)
          echo "Changed files:"
          echo "$CHANGED_FILES"
          
          INVALID_FILES=$(echo "$CHANGED_FILES" | grep -v '^skills/field-journal/.*\.md$' || true)
          if [ -n "$INVALID_FILES" ]; then
            echo "❌ PR 包含非 field-journal 文件："
            echo "$INVALID_FILES"
            echo "valid=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          # 2. 检查文件内容安全性
          for file in $CHANGED_FILES; do
            if [ -f "$file" ]; then
              # 检查 prompt injection 特征
              if grep -iE "(ignore previous|you are now|forget all|system prompt|<script|javascript:|onerror=|onload=)" "$file"; then
                echo "❌ 文件 $file 包含可疑内容（可能是 prompt injection）"
                echo "valid=false" >> $GITHUB_OUTPUT
                exit 1
              fi
              
              # 检查是否包含可执行代码伪装
              if grep -E "^(#!/|import |require\(|from .* import|exec\(|eval\(|os\.system)" "$file"; then
                echo "❌ 文件 $file 包含可执行代码特征"
                echo "valid=false" >> $GITHUB_OUTPUT
                exit 1
              fi
              
              # 检查是否包含未脱敏的真实 token/key
              if grep -iE "(AKIA[0-9A-Z]{16}|sk-[a-zA-Z0-9]{48}|ghp_[a-zA-Z0-9]{36}|npm_[a-zA-Z0-9]{36})" "$file"; then
                echo "❌ 文件 $file 包含疑似真实 API key/token"
                echo "valid=false" >> $GITHUB_OUTPUT
                exit 1
              fi
            fi
          done
          
          # 3. 检查文件大小（单个文件不超过 50KB，防止垃圾数据）
          for file in $CHANGED_FILES; do
            if [ -f "$file" ]; then
              SIZE=$(wc -c < "$file")
              if [ "$SIZE" -gt 51200 ]; then
                echo "❌ 文件 $file 超过 50KB（$SIZE bytes）"
                echo "valid=false" >> $GITHUB_OUTPUT
                exit 1
              fi
            fi
          done
          
          echo "✅ 所有检查通过"
          echo "valid=true" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge if valid
        if: steps.validate.outputs.valid == 'true'
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --auto --squash \
            --subject "[field-journal] ${{ github.event.pull_request.title }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on failure
        if: steps.validate.outputs.valid == 'false'
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "❌ **自动审核未通过**

          本 PR 未通过安全检查，无法自动合并。可能的原因：
          - 修改了 field-journal 以外的文件
          - 内容包含可疑的 prompt injection 特征
          - 内容包含未脱敏的 API key/token
          - 单个文件超过 50KB

          请检查并修正后重新提交。"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
